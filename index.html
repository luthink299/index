<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ĐIỀU LỆNH SỐ – THANH NIÊN CHUẨN</title>
<style>
:root{
  --bg:#0b1220; --panel:#111c30; --panel2:#16243d; --line:#22344f;
  --ink:#eaf0fb; --muted:#8ea2c4; --gold:#d4af37; --gold2:#f0d986;
  --red:#b3232c; --reddk:#7c1820; --green:#2fa66b; --amber:#e0a92b; --blue:#3d7bd6;
  --shadow:0 18px 50px rgba(0,0,0,.45);
  --nav-h:56px; /* chiều cao bottom nav mobile */
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{
  font-family:'Segoe UI',-apple-system,Tahoma,sans-serif;
  background:
    radial-gradient(1200px 600px at 80% -10%, rgba(61,123,214,.12), transparent 60%),
    radial-gradient(900px 500px at -10% 110%, rgba(179,35,44,.16), transparent 55%),
    var(--bg);
  color:var(--ink); min-height:100%;
  /* tránh safe-area trên iPhone */
  padding-bottom:env(safe-area-inset-bottom);
}

/* ===== WRAP ===== */
.wrap{max-width:1180px;margin:0 auto;padding:0 14px 80px}
@media(min-width:768px){.wrap{padding:0 18px 60px}}

/* ===== HEADER ===== */
header.app{
  background:linear-gradient(135deg,#0d1830 0%,#15233d 100%);
  border-bottom:2px solid var(--gold);
  padding:12px 0 0; position:sticky; top:0; z-index:50;
  box-shadow:0 8px 28px rgba(0,0,0,.4);
}
.hd{display:flex;align-items:center;gap:10px;max-width:1180px;margin:0 auto;padding:0 14px}
.seal{
  width:42px;height:42px;border-radius:50%;flex:0 0 auto;
  background:radial-gradient(circle at 50% 38%, var(--gold2), var(--gold) 55%, #9c7e1f 100%);
  display:grid;place-items:center;color:#3a1010;font-weight:900;font-size:18px;
  border:2px solid #f3e7b0; box-shadow:0 0 0 3px rgba(212,175,55,.18),inset 0 -3px 8px rgba(0,0,0,.25);
}
@media(min-width:768px){.seal{width:54px;height:54px;font-size:22px}}
.hd-text h1{font-size:15px;letter-spacing:.3px;line-height:1.2}
@media(min-width:768px){.hd-text h1{font-size:20px}}
.hd-text h1 b{color:var(--gold2)}
.hd-text .sub{font-size:10px;color:var(--muted);margin-top:2px;letter-spacing:.4px;text-transform:uppercase;display:none}
@media(min-width:480px){.hd-text .sub{display:block}}
.hd .right{margin-left:auto;text-align:right;font-size:11px;color:var(--muted);white-space:nowrap}
.hd .right b{color:var(--ink);font-size:12px;display:block}

/* ===== DESKTOP TABS ===== */
nav.tabs{display:none}
@media(min-width:768px){
  nav.tabs{display:flex;gap:4px;max-width:1180px;margin:14px auto 0;padding:0 12px;flex-wrap:wrap}
  nav.tabs button{
    background:transparent;border:none;color:var(--muted);font-weight:600;font-size:13.5px;
    padding:11px 15px;cursor:pointer;border-bottom:3px solid transparent;border-radius:8px 8px 0 0;
    display:flex;align-items:center;gap:7px;transition:.18s;letter-spacing:.2px;
  }
  nav.tabs button .ic{font-size:15px}
  nav.tabs button:hover{color:var(--ink);background:rgba(255,255,255,.04)}
  nav.tabs button.active{color:var(--gold2);border-bottom-color:var(--gold);background:rgba(212,175,55,.07)}
}

/* ===== BOTTOM NAV MOBILE ===== */
.bnav{
  display:flex;position:fixed;bottom:0;left:0;right:0;z-index:100;
  background:#0d1828;border-top:1px solid var(--line);
  padding-bottom:env(safe-area-inset-bottom);
  box-shadow:0 -4px 20px rgba(0,0,0,.5);
}
@media(min-width:768px){.bnav{display:none}}
.bnav button{
  flex:1;background:none;border:none;color:var(--muted);
  padding:8px 4px 6px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;
  font-size:9px;font-weight:600;letter-spacing:.3px;text-transform:uppercase;transition:.15s;
  -webkit-tap-highlight-color:transparent;
}
.bnav button .bic{font-size:18px;line-height:1}
.bnav button.active{color:var(--gold2)}
.bnav button.active .bic{text-shadow:0 0 10px rgba(212,175,55,.6)}

/* ===== GENERIC ===== */
.view{display:none;animation:fade .25s ease}
.view.active{display:block}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

section.card{
  background:linear-gradient(180deg,var(--panel) 0%,var(--panel2) 100%);
  border:1px solid var(--line);border-radius:12px;padding:16px;margin-top:14px;box-shadow:var(--shadow);
}
@media(min-width:768px){section.card{padding:20px;border-radius:14px;margin-top:18px}}

.card h2{font-size:15px;color:var(--gold2);margin-bottom:4px;letter-spacing:.3px;display:flex;align-items:center;gap:8px}
.card .desc{font-size:12px;color:var(--muted);margin-bottom:14px;line-height:1.5}
h3.sec{font-size:12px;color:var(--gold);text-transform:uppercase;letter-spacing:1px;margin:18px 0 10px;border-left:3px solid var(--gold);padding-left:10px}

label{display:block;font-size:12px;color:var(--muted);margin:0 0 5px;font-weight:600;letter-spacing:.3px}
input,select,textarea{
  width:100%;background:#0c1626;border:1px solid var(--line);color:var(--ink);
  padding:11px 12px;border-radius:9px;font-size:16px; /* 16px tránh zoom iOS */
  font-family:inherit;transition:.15s;
}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--gold);box-shadow:0 0 0 3px rgba(212,175,55,.15)}

.row{display:grid;gap:12px}
.row.c2{grid-template-columns:1fr 1fr}
.row.c3,.row.c4{grid-template-columns:1fr}
@media(min-width:520px){.row.c3{grid-template-columns:1fr 1fr}}
@media(min-width:768px){
  .row.c2{grid-template-columns:1fr 1fr}
  .row.c3{grid-template-columns:1fr 1fr 1fr}
  .row.c4{grid-template-columns:repeat(4,1fr)}
}

/* ===== BUTTON ===== */
.btn{
  background:linear-gradient(135deg,var(--red),var(--reddk));color:#fff;border:none;
  padding:13px 18px;border-radius:9px;font-size:15px;font-weight:700;cursor:pointer;
  letter-spacing:.3px;transition:.12s;box-shadow:0 6px 16px rgba(179,35,44,.3);
  touch-action:manipulation;
}
.btn:active{transform:scale(.97);box-shadow:none}
@media(min-width:768px){.btn:hover{transform:translateY(-1px);box-shadow:0 9px 22px rgba(179,35,44,.42)}}
.btn.gold{background:linear-gradient(135deg,var(--gold),#b8932b);color:#241803;box-shadow:0 6px 16px rgba(212,175,55,.3)}
.btn.ghost{background:transparent;border:1px solid var(--line);color:var(--ink);box-shadow:none}
.btn.ghost:hover{border-color:var(--gold);color:var(--gold2)}
.btn.sm{padding:9px 13px;font-size:13px}
.btn.blue{background:linear-gradient(135deg,var(--blue),#2a5aa8)}
.btn.full{width:100%}
.btnbar{display:flex;gap:10px;flex-wrap:wrap;margin-top:16px}
.btnbar.mobile-col{flex-direction:column}
@media(min-width:480px){.btnbar.mobile-col{flex-direction:row}}

/* ===== TABLE → card list trên mobile ===== */
.tbl-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
table{width:100%;border-collapse:collapse;font-size:13px;margin-top:6px}
th,td{padding:10px 11px;text-align:left;border-bottom:1px solid var(--line)}
th{color:var(--gold);font-size:11px;text-transform:uppercase;letter-spacing:.6px;font-weight:700;background:rgba(212,175,55,.05)}
tr:hover td{background:rgba(255,255,255,.025)}
td.num,th.num{text-align:center}

/* mobile: ẩn cột phụ bảng */
@media(max-width:520px){
  .hide-xs{display:none}
}

.pill{display:inline-block;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:700;letter-spacing:.3px}
.pill.g{background:rgba(47,166,107,.18);color:#5fd89b;border:1px solid rgba(47,166,107,.4)}
.pill.a{background:rgba(224,169,43,.18);color:#f0c860;border:1px solid rgba(224,169,43,.4)}
.pill.r{background:rgba(179,35,44,.2);color:#f08a92;border:1px solid rgba(179,35,44,.45)}
.pill.b{background:rgba(61,123,214,.18);color:#8ab6f0;border:1px solid rgba(61,123,214,.4)}

.empty{text-align:center;color:var(--muted);padding:30px;font-size:13px;font-style:italic}
.tag{font-size:11px;color:var(--muted)}

/* ===== KPI ===== */
.kpis{display:grid;grid-template-columns:1fr 1fr;gap:10px}
@media(min-width:768px){.kpis{grid-template-columns:repeat(4,1fr);gap:14px}}
.kpi{background:#0d1828;border:1px solid var(--line);border-radius:12px;padding:14px;position:relative;overflow:hidden}
.kpi::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--gold)}
.kpi.red::before{background:var(--red)}.kpi.green::before{background:var(--green)}.kpi.blue::before{background:var(--blue)}
.kpi .v{font-size:26px;font-weight:900;color:var(--gold2);line-height:1}
@media(min-width:768px){.kpi .v{font-size:30px}}
.kpi.red .v{color:#f08a92}.kpi.green .v{color:#5fd89b}.kpi.blue .v{color:#8ab6f0}
.kpi .l{font-size:11px;color:var(--muted);margin-top:5px;letter-spacing:.3px}

/* ===== CHẤM ĐIỂM ===== */
.crit{background:#0c1626;border:1px solid var(--line);border-radius:11px;padding:12px 13px;margin-bottom:10px}
.crit .top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px}
.crit .name{font-size:13px;font-weight:600;line-height:1.4}
.crit .grp{font-size:10px;color:var(--gold);text-transform:uppercase;letter-spacing:.6px;margin-bottom:3px}
.crit .opts{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-top:10px}
.opt{
  border:1px solid var(--line);border-radius:8px;padding:10px 6px;cursor:pointer;text-align:center;
  font-size:12px;transition:.12s;background:#0a1320;touch-action:manipulation;
}
.opt:active{transform:scale(.96)}
.opt.sel-ok{border-color:var(--green);background:rgba(47,166,107,.14);color:#5fd89b;font-weight:700}
.opt.sel-warn{border-color:var(--amber);background:rgba(224,169,43,.14);color:#f0c860;font-weight:700}
.opt.sel-bad{border-color:var(--red);background:rgba(179,35,44,.16);color:#f08a92;font-weight:700}
.opt small{display:block;font-size:10px;opacity:.7;margin-top:2px}

.scorebar{height:10px;background:#0a1320;border-radius:6px;overflow:hidden;border:1px solid var(--line)}
.scorebar i{display:block;height:100%;background:linear-gradient(90deg,var(--red),var(--amber) 55%,var(--green));transition:width .5s}

/* ===== QR BOX ===== */
.qrbox{display:flex;flex-direction:column;gap:20px;align-items:center}
@media(min-width:600px){.qrbox{flex-direction:row;align-items:flex-start}}
#qrcanvas{background:#fff;padding:14px;border-radius:14px;box-shadow:var(--shadow);max-width:220px;width:100%}
.qrinfo{width:100%}
@media(min-width:600px){.qrinfo{flex:1;min-width:220px}}

/* ===== KHO HỌC LIỆU ===== */
.lib{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(min-width:600px){.lib{grid-template-columns:repeat(3,1fr)}}
@media(min-width:1024px){.lib{grid-template-columns:repeat(4,1fr)}}
.lcard{background:#0d1828;border:1px solid var(--line);border-radius:12px;overflow:hidden;transition:.18s}
.lcard:active{border-color:var(--gold)}
@media(min-width:768px){.lcard:hover{border-color:var(--gold);transform:translateY(-2px)}}
.lcard .qr{background:#fff;padding:10px;display:grid;place-items:center}
.lcard .qr canvas{width:110px!important;height:110px!important;display:block}
.lcard .b{padding:10px}
.lcard .b h4{font-size:12.5px;margin-bottom:4px;color:var(--gold2)}
.lcard .b p{font-size:11px;color:var(--muted);line-height:1.4}

/* ===== BAR ===== */
.bar{display:flex;align-items:center;gap:8px;margin:6px 0;font-size:12px}
.bar .nm{width:100px;flex:0 0 auto;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
@media(min-width:600px){.bar .nm{width:150px}}
.bar .tr{flex:1;height:16px;background:#0a1320;border-radius:5px;overflow:hidden;border:1px solid var(--line)}
.bar .tr i{display:block;height:100%;border-radius:5px}
.bar .vl{width:40px;text-align:right;font-weight:700}

.note{font-size:11.5px;color:var(--muted);background:rgba(61,123,214,.08);border:1px solid rgba(61,123,214,.25);border-radius:9px;padding:10px 12px;line-height:1.5;margin-top:12px}
.note b{color:#8ab6f0}
.flex{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
.spacer{flex:1}
footer{text-align:center;color:var(--muted);font-size:11px;margin-top:24px;line-height:1.6;padding:0 10px}

.modal-bg{display:none;position:fixed;inset:0;background:rgba(4,8,16,.8);z-index:200;place-items:center;padding:16px;overscroll-behavior:contain}
.modal-bg.show{display:grid}
.modal{background:var(--panel);border:1px solid var(--gold);border-radius:14px;max-width:480px;width:100%;padding:20px;box-shadow:var(--shadow);max-height:90vh;overflow-y:auto}
.modal h3{color:var(--gold2);margin-bottom:14px}

/* ===== MEMBER CARDS trên mobile ===== */
.mcard{background:#0c1626;border:1px solid var(--line);border-radius:10px;padding:12px 13px;margin-bottom:8px;display:flex;align-items:center;gap:12px}
.mcard .avatar{width:36px;height:36px;border-radius:50%;background:rgba(212,175,55,.15);border:1px solid var(--gold);display:grid;place-items:center;font-size:14px;flex:0 0 auto}
.mcard .info{flex:1;min-width:0}
.mcard .info .nm{font-size:14px;font-weight:700;color:var(--ink)}
.mcard .info .sub{font-size:11px;color:var(--muted);margin-top:2px}
</style>
</head>
<body>
<header class="app">
  <div class="hd">
    <div class="seal">★</div>
    <div class="hd-text">
      <h1>ĐIỀU LỆNH SỐ – <b>THANH NIÊN CHUẨN</b></h1>
      <div class="sub">Công trình thanh niên chuyển đổi số · Chấp hành điều lệnh CAND</div>
    </div>
    <div class="right">
      <div id="unitName">Ban Thanh niên CA tỉnh</div>
      <b id="todayTxt"></b>
    </div>
  </div>
  <nav class="tabs" id="tabs">
    <button data-v="dash" class="active"><span class="ic">▣</span>Dashboard</button>
    <button data-v="dvtn"><span class="ic">◷</span>Quản lý ĐVTN</button>
    <button data-v="qr"><span class="ic">▦</span>QR điểm danh</button>
    <button data-v="cham"><span class="ic">✔</span>Chấm điều lệnh</button>
    <button data-v="thidua"><span class="ic">★</span>Thi đua – xếp loại</button>
    <button data-v="khoqr"><span class="ic">▤</span>Kho học liệu QR</button>
  </nav>
</header>

<!-- BOTTOM NAV (chỉ hiện trên mobile) -->
<nav class="bnav" id="bnav">
  <button data-v="dash" class="active"><span class="bic">▣</span>Tổng quan</button>
  <button data-v="dvtn"><span class="bic">👤</span>ĐVTN</button>
  <button data-v="qr"><span class="bic">▦</span>QR</button>
  <button data-v="cham"><span class="bic">✔</span>Chấm</button>
  <button data-v="thidua"><span class="bic">★</span>Thi đua</button>
  <button data-v="khoqr"><span class="bic">▤</span>Học liệu</button>
</nav>
<div class="wrap">
  <!-- ====== DASHBOARD ====== -->
  <div class="view active" id="v-dash"></div>
  <!-- ====== ĐVTN ====== -->
  <div class="view" id="v-dvtn"></div>
  <!-- ====== QR ====== -->
  <div class="view" id="v-qr"></div>
  <!-- ====== CHẤM ====== -->
  <div class="view" id="v-cham"></div>
  <!-- ====== THI ĐUA ====== -->
  <div class="view" id="v-thidua"></div>
  <!-- ====== KHO QR ====== -->
  <div class="view" id="v-khoqr"></div>

  <footer>
    Phần mềm chạy nội bộ, không kết nối Internet · Dữ liệu lưu trên thiết bị · Phục vụ phong trào thi đua
    <b style="color:var(--gold2)">"Ba nhất"</b> – nhóm tiêu chí "Nghiêm kỷ cương" &amp; "Tường công nghệ"
  </footer>
</div>

<div class="modal-bg" id="modalBg"><div class="modal" id="modalBody"></div></div>

<script>
//---------------------------------------------------------------------
//
// QR Code Generator for JavaScript
//
// Copyright (c) 2009 Kazuhiko Arase
//
// URL: http://www.d-project.com/
//
// Licensed under the MIT license:
//  http://www.opensource.org/licenses/mit-license.php

// The word 'QR Code' is registered trademark of
// DENSO WAVE INCORPORATED
//  http://www.denso-wave.com/qrcode/faqpatent-e.html
//
//---------------------------------------------------------------------

var qrcode = function() {

  //---------------------------------------------------------------------
  // qrcode
  //---------------------------------------------------------------------

  /**
   * qrcode
   * @param typeNumber 1 to 40
   * @param errorCorrectionLevel 'L','M','Q','H'
   */
  var qrcode = function(typeNumber, errorCorrectionLevel) {

    var PAD0 = 0xEC;
    var PAD1 = 0x11;

    var _typeNumber = typeNumber;
    var _errorCorrectionLevel = QRErrorCorrectionLevel[errorCorrectionLevel];
    var _modules = null;
    var _moduleCount = 0;
    var _dataCache = null;
    var _dataList = [];

    var _this = {};

    var makeImpl = function(test, maskPattern) {

      _moduleCount = _typeNumber * 4 + 17;
      _modules = function(moduleCount) {
        var modules = new Array(moduleCount);
        for (var row = 0; row < moduleCount; row += 1) {
          modules[row] = new Array(moduleCount);
          for (var col = 0; col < moduleCount; col += 1) {
            modules[row][col] = null;
          }
        }
        return modules;
      }(_moduleCount);

      setupPositionProbePattern(0, 0);
      setupPositionProbePattern(_moduleCount - 7, 0);
      setupPositionProbePattern(0, _moduleCount - 7);
      setupPositionAdjustPattern();
      setupTimingPattern();
      setupTypeInfo(test, maskPattern);

      if (_typeNumber >= 7) {
        setupTypeNumber(test);
      }

      if (_dataCache == null) {
        _dataCache = createData(_typeNumber, _errorCorrectionLevel, _dataList);
      }

      mapData(_dataCache, maskPattern);
    };

    var setupPositionProbePattern = function(row, col) {

      for (var r = -1; r <= 7; r += 1) {

        if (row + r <= -1 || _moduleCount <= row + r) continue;

        for (var c = -1; c <= 7; c += 1) {

          if (col + c <= -1 || _moduleCount <= col + c) continue;

          if ( (0 <= r && r <= 6 && (c == 0 || c == 6) )
              || (0 <= c && c <= 6 && (r == 0 || r == 6) )
              || (2 <= r && r <= 4 && 2 <= c && c <= 4) ) {
            _modules[row + r][col + c] = true;
          } else {
            _modules[row + r][col + c] = false;
          }
        }
      }
    };

    var getBestMaskPattern = function() {

      var minLostPoint = 0;
      var pattern = 0;

      for (var i = 0; i < 8; i += 1) {

        makeImpl(true, i);

        var lostPoint = QRUtil.getLostPoint(_this);

        if (i == 0 || minLostPoint > lostPoint) {
          minLostPoint = lostPoint;
          pattern = i;
        }
      }

      return pattern;
    };

    var setupTimingPattern = function() {

      for (var r = 8; r < _moduleCount - 8; r += 1) {
        if (_modules[r][6] != null) {
          continue;
        }
        _modules[r][6] = (r % 2 == 0);
      }

      for (var c = 8; c < _moduleCount - 8; c += 1) {
        if (_modules[6][c] != null) {
          continue;
        }
        _modules[6][c] = (c % 2 == 0);
      }
    };

    var setupPositionAdjustPattern = function() {

      var pos = QRUtil.getPatternPosition(_typeNumber);

      for (var i = 0; i < pos.length; i += 1) {

        for (var j = 0; j < pos.length; j += 1) {

          var row = pos[i];
          var col = pos[j];

          if (_modules[row][col] != null) {
            continue;
          }

          for (var r = -2; r <= 2; r += 1) {

            for (var c = -2; c <= 2; c += 1) {

              if (r == -2 || r == 2 || c == -2 || c == 2
                  || (r == 0 && c == 0) ) {
                _modules[row + r][col + c] = true;
              } else {
                _modules[row + r][col + c] = false;
              }
            }
          }
        }
      }
    };

    var setupTypeNumber = function(test) {

      var bits = QRUtil.getBCHTypeNumber(_typeNumber);

      for (var i = 0; i < 18; i += 1) {
        var mod = (!test && ( (bits >> i) & 1) == 1);
        _modules[Math.floor(i / 3)][i % 3 + _moduleCount - 8 - 3] = mod;
      }

      for (var i = 0; i < 18; i += 1) {
        var mod = (!test && ( (bits >> i) & 1) == 1);
        _modules[i % 3 + _moduleCount - 8 - 3][Math.floor(i / 3)] = mod;
      }
    };

    var setupTypeInfo = function(test, maskPattern) {

      var data = (_errorCorrectionLevel << 3) | maskPattern;
      var bits = QRUtil.getBCHTypeInfo(data);

      // vertical
      for (var i = 0; i < 15; i += 1) {

        var mod = (!test && ( (bits >> i) & 1) == 1);

        if (i < 6) {
          _modules[i][8] = mod;
        } else if (i < 8) {
          _modules[i + 1][8] = mod;
        } else {
          _modules[_moduleCount - 15 + i][8] = mod;
        }
      }

      // horizontal

        var b2 = read();

      var bytes = [];

        if (c < 128) {

/* ---------- QR RENDER (qrcode-generator, UTF-8, auto version) ---------- */
qrcode.stringToBytes = qrcode.stringToBytesFuncs['UTF-8'];
function renderQR(container, text, sizePx){
  try{
    const qr = qrcode(0, 'M'); qr.addData(text||' '); qr.make();
    const n = qr.getModuleCount(); const quiet=4; const total=n+quiet*2;
    const scale = Math.max(2, Math.floor((sizePx||200)/total));
    const px = total*scale;
    const cv = document.createElement('canvas'); cv.width=px; cv.height=px;
    cv.style.width=(sizePx||200)+'px'; cv.style.height=(sizePx||200)+'px';
    const ctx = cv.getContext('2d');
    ctx.fillStyle='#ffffff'; ctx.fillRect(0,0,px,px);
    ctx.fillStyle='#0b1220';
    for(let r=0;r<n;r++) for(let c=0;c<n;c++){ if(qr.isDark(r,c)) ctx.fillRect((c+quiet)*scale,(r+quiet)*scale,scale,scale); }
    container.innerHTML=''; container.appendChild(cv);
  }catch(e){ container.innerHTML='<div style="color:#b3232c;font-size:11px;padding:10px">Lỗi sinh QR (nội dung quá dài)</div>'; }
}

}

    </table>
  </section>`;
};
function addMember(){
  const name=$('#m_name').value.trim(); if(!name){ alert('Nhập họ tên'); return; }
  const ms=members();
  ms.push({
    id:'tn'+Date.now(), name,
    rank:$('#m_rank').value.trim()||'—',
    team:$('#m_team').value.trim()||'—',
    code:$('#m_code').value.trim()||('CA-'+Math.floor(1000+Math.random()*9000)),
    dob:$('#m_dob').value.trim()||''
  });
  DB.save('members',ms); RENDER.dvtn();
}
function delMember(id){
  if(!confirm('Xóa đoàn viên này khỏi danh sách?')) return;
  DB.save('members', members().filter(m=>m.id!==id)); RENDER.dvtn();
}

/* -------------------- 3. QR ĐIỂM DANH -------------------- */
RENDER.qr = function(){
  const tdCk=checkins().filter(c=>c.date===today());
  $('#v-qr').innerHTML = `
  <section class="card">
    <h2>▦ QR điểm danh điều lệnh</h2>
    <div class="desc">Sinh mã QR điểm danh theo ngày. ĐVTN quét mã / chọn tên để xác nhận có mặt đầu giờ. Dữ liệu cập nhật tức thời, phục vụ tiêu chí kỷ luật thời gian.</div>
    <div class="qrbox">
      <div id="qrcanvas"></div>
      <div class="qrinfo">
        <h3 class="sec" style="margin-top:0">Phiên điểm danh: ${fmtDate(today())}</h3>
        <p class="tag" style="line-height:1.7">Mã phiên được nhúng trong QR. Đặt QR tại cổng/phòng giao ban đầu giờ.<br>
        Quét bằng camera điện thoại → mở phần điểm danh trên thiết bị nội bộ.</p>
        <div class="btnbar">
          <button class="btn blue sm" onclick="markAll()">Đánh dấu cả đơn vị có mặt</button>
          <button class="btn ghost sm" onclick="resetToday()">Xóa điểm danh hôm nay</button>
        </div>
        <div class="note"><b>Lưu ý nghiệp vụ:</b> QR chỉ xác nhận "có mặt". Việc đánh giá <b>vi phạm điều lệnh</b> thực hiện ở mục "Chấm điều lệnh".</div>
      </div>
    </div>

    <h3 class="sec">Điểm danh hôm nay (${tdCk.length}/${members().length})</h3>
    <table>
      <thead><tr><th>Họ tên</th><th>Đội/Đơn vị</th><th class="num">Trạng thái</th><th class="num">Thời gian</th></tr></thead>
      <tbody>
        ${members().map(m=>{
          const c=tdCk.find(x=>x.memberId===m.id);
          return `<tr><td><b>${esc(m.name)}</b></td><td>${esc(m.team)}</td>
            <td class="num">${c?'<span class="pill g">Có mặt</span>':'<span class="pill r">Chưa</span>'}</td>
            <td class="num">${c? c.time : '<button class="btn ghost sm" onclick="checkin(\''+m.id+'\')">Điểm danh</button>'}</td></tr>`;
        }).join('')}
      </tbody>
    </table>
  </section>`;
  // vẽ QR
  renderQR($('#qrcanvas'), 'DIEULENH|DIEMDANH|'+today(), 200);
};
function checkin(id){
  const cks=checkins();
  if(cks.find(c=>c.memberId===id&&c.date===today())) return;
  cks.push({memberId:id, date:today(), time:new Date().toLocaleTimeString('vi-VN',{hour:'2-digit',minute:'2-digit'})});
  DB.save('checkins',cks); RENDER.qr();
}
function markAll(){ members().forEach(m=>checkin(m.id)); RENDER.qr(); }
function resetToday(){
  if(!confirm('Xóa toàn bộ điểm danh hôm nay?')) return;
  DB.save('checkins', checkins().filter(c=>c.date!==today())); RENDER.qr();
}

/* -------------------- 4. CHẤM ĐIỀU LỆNH (Form điện tử) -------------------- */
let CHAM_STATE = {}; // {critId: points}
RENDER.cham = function(){
  const ms=members();
  const opts = ms.map(m=>`<option value="${m.id}">${esc(m.name)} – ${esc(m.team)}</option>`).join('');
  const grouped={};
  CRITERIA.forEach(c=>{ (grouped[c.grp]=grouped[c.grp]||[]).push(c); });

  $('#v-cham').innerHTML = `
  <section class="card">
    <h2>✔ Form tự kiểm tra – chấm điều lệnh</h2>
    <div class="desc">Tổ điều lệnh chấm theo từng tiêu chí. Mỗi tiêu chí 3 mức: <b style="color:#5fd89b">Đạt</b> · <b style="color:#f0c860">Sai sót nhỏ</b> · <b style="color:#f08a92">Vi phạm</b>. Phần mềm tự tổng điểm, tự xếp loại, lưu vào hồ sơ.</div>
    <div class="row c3">
      <div><label>Đối tượng kiểm tra</label><select id="ch_member">${opts}</select></div>
      <div><label>Ngày kiểm tra</label><input type="date" id="ch_date" value="${today()}"></div>
      <div><label>Hình thức</label><select id="ch_type"><option>Tự kiểm tra định kỳ</option><option>Kiểm tra đột xuất</option><option>Kiểm tra trực ban</option></select></div>
    </div>

    ${Object.keys(grouped).map(g=>`
      <h3 class="sec">${g}</h3>
      ${grouped[g].map(c=>`
        <div class="crit" id="crit-${c.id}">
          <div class="top"><div>
            <div class="grp">Tối đa ${c.max} điểm</div>
            <div class="name">${c.name}</div>
          </div></div>
          <div class="opts">
            <div class="opt" data-c="${c.id}" data-p="${c.max}"  data-k="ok"   onclick="pick(this)">Đạt<small>+${c.max}đ</small></div>
            <div class="opt" data-c="${c.id}" data-p="${Math.round(c.max*0.6)}" data-k="warn" onclick="pick(this)">Sai sót nhỏ<small>+${Math.round(c.max*0.6)}đ</small></div>
            <div class="opt" data-c="${c.id}" data-p="0" data-k="bad" onclick="pick(this)">Vi phạm<small>0đ</small></div>
          </div>
        </div>`).join('')}
    `).join('')}

    <h3 class="sec">Ghi chú / Nội dung vi phạm cần chấn chỉnh</h3>
    <textarea id="ch_note" rows="3" placeholder="VD: Đeo biển tên chưa đúng vị trí; chậm 5 phút giờ giao ban..."></textarea>

    <div class="card" style="margin-top:18px;background:#0c1626;position:sticky;bottom:60px;z-index:10">
      <div class="flex" style="gap:14px;flex-wrap:wrap">
        <div><div class="tag">TỔNG ĐIỂM ĐIỀU LỆNH</div>
          <div style="font-size:32px;font-weight:900;color:var(--gold2)" id="ch_total">—</div></div>
        <div style="flex:1;min-width:160px">
          <div class="scorebar"><i id="ch_bar" style="width:0%"></i></div>
          <div class="tag" style="margin-top:6px" id="ch_class">Chọn mức cho từng tiêu chí</div>
        </div>
        <button class="btn gold full" style="min-width:160px" onclick="saveReview()">💾 Lưu kết quả</button>
      </div>
    </div>
  </section>`;
  CHAM_STATE={}; updateTotal();
};
function pick(el){
  const cid=el.dataset.c;
  document.querySelectorAll(`#crit-${cid} .opt`).forEach(o=>o.classList.remove('sel-ok','sel-warn','sel-bad'));
  el.classList.add('sel-'+el.dataset.k);
  CHAM_STATE[cid]={p:parseInt(el.dataset.p), k:el.dataset.k};
  updateTotal();
}
function updateTotal(){
  let got=0, done=0, hasViol=false;
  CRITERIA.forEach(c=>{ const s=CHAM_STATE[c.id]; if(s){ got+=s.p; done++; if(s.k==='bad') hasViol=true; } });
  const pct=Math.round(got/CRIT_MAX*100);
  $('#ch_total').textContent = done? got : '—';
  $('#ch_bar').style.width = (done? pct:0)+'%';
  if(done<CRITERIA.length){ $('#ch_class').textContent=`Đã chấm ${done}/${CRITERIA.length} tiêu chí`; }
  else { const c=classify(got); $('#ch_class').innerHTML=`Xếp loại: <b style="color:var(--gold2)">${c.label}</b>${hasViol?' · <span style="color:#f08a92">có vi phạm</span>':''}`; }
}
function saveReview(){
  if(Object.keys(CHAM_STATE).length<CRITERIA.length){ alert('Vui lòng chấm đủ tất cả tiêu chí.'); return; }
  const mid=$('#ch_member').value;
  let got=0, hasViol=false; const detail={};
  CRITERIA.forEach(c=>{ const s=CHAM_STATE[c.id]; got+=s.p; detail[c.id]=s.p; if(s.k==='bad') hasViol=true; });
  const rvs=reviews();
  rvs.push({ id:'rv'+Date.now(), memberId:mid, date:$('#ch_date').value, type:$('#ch_type').value,
    score:got, hasViolation:hasViol, detail, note:$('#ch_note').value.trim() });
  DB.save('reviews',rvs);
  const c=classify(got);
  modal(`<h3>✔ Đã lưu kết quả</h3>
    <p style="line-height:1.7;font-size:14px">Đối tượng: <b>${esc(memberById(mid).name)}</b><br>
    Tổng điểm điều lệnh: <b style="color:var(--gold2);font-size:18px">${got}/100</b><br>
    Xếp loại: <span class="pill ${c.cls}">${c.label}</span> ${hasViol?'<span class="pill r">Có vi phạm</span>':''}</p>
    <div class="btnbar"><button class="btn gold" onclick="closeModal();nav('thidua')">Xem bảng thi đua</button>
    <button class="btn ghost" onclick="closeModal();RENDER.cham()">Chấm tiếp</button></div>`);
}

/* -------------------- 5. THI ĐUA – XẾP LOẠI -------------------- */
RENDER.thidua = function(){
  const rvs=reviews(), ms=members();
  // tổng hợp theo người: điểm TB + số vi phạm + số lần đánh giá
  const agg={};
  rvs.forEach(r=>{
    const a=agg[r.memberId]=agg[r.memberId]||{sum:0,n:0,viol:0,last:0};
    a.sum+=r.score; a.n++; if(r.hasViolation) a.viol++; if(r.date>a.last||!a.last) a.last=r.date;
  });
  const rows=ms.map(m=>{
    const a=agg[m.id]; if(!a) return {m, avg:null};
    return {m, avg:Math.round(a.sum/a.n), n:a.n, viol:a.viol, last:a.last};
  }).filter(x=>x.avg!=null).sort((a,b)=>b.avg-a.avg);

  // thống kê 4 nhóm xếp loại
  const buckets={g:0,b:0,a:0,r:0};
  rows.forEach(x=>buckets[classify(x.avg).cls]++);

  $('#v-thidua').innerHTML = `
  <section class="card">
    <h2>★ Thi đua – tự động xếp loại điều lệnh</h2>
    <div class="desc">Tổng hợp điểm điều lệnh trung bình của từng ĐVTN làm căn cứ bình xét thi đua. Phân loại theo 4 nhóm bám Kế hoạch phong trào cấp tỉnh.</div>
    <div class="kpis">
      <div class="kpi green"><div class="v">${buckets.g}</div><div class="l">Điển hình tiên tiến (≥95)</div></div>
      <div class="kpi blue"><div class="v">${buckets.b}</div><div class="l">Thực hiện tốt (85–94)</div></div>
      <div class="kpi"><div class="v">${buckets.a}</div><div class="l">Duy trì khá (70–84)</div></div>
      <div class="kpi red"><div class="v">${buckets.r}</div><div class="l">Cần cố gắng (&lt;70)</div></div>
    </div>

    <h3 class="sec">Bảng xếp loại chi tiết</h3>
    <div class="tbl-wrap">
    <table>
      <thead><tr><th class="num">#</th><th>Họ tên</th><th class="hide-xs">Đội/Đơn vị</th><th class="num hide-xs">KT</th><th class="num">Vi phạm</th><th class="num">Điểm TB</th><th>Xếp loại</th><th class="num">Hồ sơ</th></tr></thead>
      <tbody>
        ${rows.map((x,i)=>{
          const c=classify(x.avg);
          return `<tr><td class="num">${i+1}</td><td><b>${esc(x.m.name)}</b> <span class="tag">${esc(x.m.rank)}</span></td>
            <td class="hide-xs">${esc(x.m.team)}</td><td class="num hide-xs">${x.n}</td>
            <td class="num">${x.viol?('<span class="pill r">'+x.viol+'</span>'):'<span class="pill g">0</span>'}</td>
            <td class="num"><b style="font-size:15px">${x.avg}</b></td>
            <td><span class="pill ${c.cls}">${c.label}</span></td>
            <td class="num"><button class="btn ghost sm" onclick="memberHistory('${x.m.id}')">Xem</button></td></tr>`;
        }).join('') || '<tr><td colspan="8" class="empty">Chưa có dữ liệu. Hãy chấm điều lệnh trước.</td></tr>'}
      </tbody>
    </table>
    </div>
    <div class="btnbar"><button class="btn blue sm" onclick="exportCSV()">⬇ Xuất báo cáo (CSV/Excel)</button></div>
  </section>`;
};
function memberHistory(id){
  const m=memberById(id);
  const list=reviews().filter(r=>r.memberId===id).sort((a,b)=>a.date<b.date?1:-1);
  modal(`<h3>Hồ sơ điều lệnh: ${esc(m.name)}</h3>
    <table><thead><tr><th>Ngày</th><th>Hình thức</th><th class="num">Điểm</th><th>Loại</th></tr></thead>
    <tbody>${list.map(r=>{const c=classify(r.score);
      return `<tr><td>${fmtDate(r.date)}</td><td class="tag">${esc(r.type)}</td><td class="num"><b>${r.score}</b></td><td><span class="pill ${c.cls}">${c.label}</span></td></tr>`;
    }).join('')||'<tr><td colspan="4" class="empty">Chưa có</td></tr>'}</tbody></table>
    <div class="btnbar"><button class="btn ghost" onclick="closeModal()">Đóng</button></div>`);
}
function exportCSV(){
  const rvs=reviews();
  let csv='\uFEFFHo ten,Cap bac,Don vi,Ngay,Hinh thuc,Diem,Xep loai,Vi pham\n';
  rvs.forEach(r=>{ const m=memberById(r.memberId); if(!m) return;
    csv+=`"${m.name}","${m.rank}","${m.team}","${r.date}","${r.type}",${r.score},"${classify(r.score).label}","${r.hasViolation?'Co':'Khong'}"\n`;
  });
  const blob=new Blob([csv],{type:'text/csv;charset=utf-8'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob);
  a.download='bao_cao_dieu_lenh_'+today()+'.csv'; a.click();
}

/* -------------------- 6. KHO HỌC LIỆU QR -------------------- */
RENDER.khoqr = function(){
  const lib=library();
  $('#v-khoqr').innerHTML = `
  <section class="card">
    <h2>▤ Kho học liệu QR – tuyên truyền điều lệnh</h2>
    <div class="desc">Mỗi tài liệu điều lệnh gắn 01 mã QR. ĐVTN quét mã để truy cập nhanh, học mọi lúc – phục vụ "tự soi, tự sửa, tự rèn".</div>
    <div class="row c3">
      <div><label>Tên tài liệu</label><input id="lib_title" placeholder="VD: Quy định về trực ban"></div>
      <div><label>Mô tả ngắn</label><input id="lib_desc" placeholder="Nội dung chính"></div>
      <div><label>Đường dẫn (URL nội bộ / cổng TT)</label><input id="lib_url" placeholder="https://..."></div>
    </div>
    <div class="btnbar"><button class="btn gold" onclick="addLib()">+ Thêm học liệu &amp; sinh QR</button></div>

    <h3 class="sec">Học liệu (${lib.length})</h3>
    <div class="lib" id="libGrid"></div>
  </section>`;
  const grid=$('#libGrid'); grid.innerHTML='';
  if(!lib.length){ grid.innerHTML='<div class="empty">Chưa có học liệu</div>'; return; }
  lib.forEach(l=>{
    const card=document.createElement('div'); card.className='lcard';
    card.innerHTML=`<div class="qr"></div><div class="b"><h4>${esc(l.title)}</h4><p>${esc(l.desc)}</p>
      <div style="margin-top:9px"><button class="btn ghost sm" onclick="delLib('${l.id}')">Xóa</button></div></div>`;
    grid.appendChild(card);
    renderQR(card.querySelector('.qr'), l.url||l.title, 130);
  });
};
function addLib(){
  const t=$('#lib_title').value.trim(); if(!t){ alert('Nhập tên tài liệu'); return; }
  const lib=library();
  lib.push({id:'l'+Date.now(), title:t, desc:$('#lib_desc').value.trim()||'—', url:$('#lib_url').value.trim()||t});
  DB.save('library',lib); RENDER.khoqr();
}
function delLib(id){ DB.save('library', library().filter(l=>l.id!==id)); RENDER.khoqr(); }
